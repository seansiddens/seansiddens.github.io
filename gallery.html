<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery &mdash; Sean Siddens</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    main {
      max-width: 1400px;
    }

    .gallery-item {
      margin: 0;
    }

    .gallery-item img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
      border-radius: 2px;
    }

    .gallery-item figcaption {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .gallery-item figcaption a {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .gallery-item figcaption a:hover {
      color: var(--accent);
    }

    @media (max-width: 560px) {
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 1rem;
      }

      .gallery-item img {
        height: 160px;
      }
    }
  </style>
</head>
<body>

  <div class="page-nav"><a href="/">← home</a></div>

  <main>
    <h1>Gallery</h1>

    <div class="gallery-grid">

      <figure class="gallery-item">
        <img src="assets/images/gallery/ca_pathtrace_forest.png" alt="Path-traced forest scene">
        <figcaption>Path-traced forest scene &mdash; <a href="https://github.com/seansiddens/PathTracer">PathTracer</a></figcaption>
      </figure>

      <figure class="gallery-item">
        <img src="assets/images/gallery/ia_dark_scene.png" alt="Dark path-traced scene">

      </figure>

      <figure class="gallery-item">

      </figure>

      <figure class="gallery-item">
